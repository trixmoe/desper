<!doctype html>
<html>
    <head>
        <title></title>
        <meta charset="UTF-8">
        <script>
            document.currentScript.remove();
            const s = document.createElement("script");
            s.src = "main.js?v=" + crypto.randomUUID();
            document.head.appendChild(s);
        </script>
        <style>
            html, body {
                margin: 0;
                padding: 0;
            }
            #display-container {
                display:flex; justify-content: center;
                /* padding counts width/height */
                /* padding: 5vw 5vw; box-sizing: border-box; */
                width: 100vw; height: 100vh; 
                background-color: #000000;
            }
            .content {
                max-width: 100%;
                max-height: 100%;
                min-width: 0;
                min-height: 0;
                object-fit: contain;
            }
        </style>
    </head>

    <body>
        <div id="display-container">
        </div>
    </body>
</html>
